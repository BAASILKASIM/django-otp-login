<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Email OTP Login</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4 sm:p-6">

  <div class="w-full max-w-md">

    <!-- Card -->
    <div class="bg-white shadow-xl rounded-2xl p-8 md:p-10 border border-gray-100">

      <!-- Header -->
      <div class="text-center mb-8">
        <h2 class="text-2xl md:text-3xl font-bold text-gray-900 tracking-tight">
          Email OTP Login
        </h2>
        <p class="mt-3 text-gray-500 text-sm md:text-base">
          Enter your email to receive a one-time password
        </p>
      </div>

      <!-- Success / Info message -->
      {% if message %}
        <div class="mb-6 p-4 bg-green-50 border border-green-200 text-green-700 rounded-xl text-sm flex items-center gap-3">
          <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
          </svg>
          <span>{{ message }}</span>
        </div>
      {% endif %}

      <!-- Form -->
      <form method="POST" class="space-y-6">
        {% csrf_token %}

        <!-- Email Input -->
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
            Email address
          </label>
          <input
            type="email"
            name="email"
            id="email"
            required
            autocomplete="email"
            placeholder="you@example.com"
            class="block w-full px-5 py-3.5
                   border border-gray-300 rounded-xl
                   focus:border-indigo-500 focus:ring-indigo-500 focus:outline-none
                   transition duration-200 bg-gray-50 hover:bg-white
                   text-gray-900 placeholder-gray-400 shadow-sm
                   text-base"
          />
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="w-full py-3.5 px-6 bg-indigo-600 hover:bg-indigo-700
                 text-white font-medium rounded-xl text-base md:text-lg
                 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2
                 transition duration-200 shadow-md hover:shadow-lg
                 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          Send OTP
        </button>

      </form>

      <!-- Optional footer links -->
      <div class="mt-8 text-center text-sm text-gray-500 space-y-2">
        <p>
          Already have an OTP? 
          <a href="#" class="text-indigo-600 hover:text-indigo-700 font-medium hover:underline">
            Verify here
          </a>
        </p>
        <p>
          <a href="#" class="text-gray-600 hover:text-gray-800 hover:underline">
            Need help?
          </a>
        </p>
      </div>

    </div>

    <!-- Tiny brand / copyright line -->
    <p class="mt-8 text-center text-xs text-gray-400">
      Secure • Fast • Simple
    </p>

  </div>

</body>
</html>
