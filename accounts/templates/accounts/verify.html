<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify OTP</title>
  
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* Optional: small custom tweaks if you want something extra */
    .input-focus-ring {
      @apply ring-2 ring-indigo-500 ring-offset-2;
    }
  </style>
</head>

<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">

  <div class="w-full max-w-md">

    <!-- Card -->
    <div class="bg-white shadow-xl rounded-2xl p-8 md:p-10 border border-gray-100">

      <!-- Heading -->
      <div class="text-center mb-8">
        <h2 class="text-2xl md:text-3xl font-bold text-gray-800 tracking-tight">
          Enter Verification Code
        </h2>
        <p class="mt-3 text-gray-500 text-sm md:text-base">
          We've sent a 6-digit code to your email/phone
        </p>
      </div>

      <!-- Error message -->
      {% if error %}
        <div class="mb-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-xl text-sm flex items-center gap-3">
          <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
          </svg>
          <span>{{ error }}</span>
        </div>
      {% endif %}

      <!-- Form -->
      <form method="POST" class="space-y-6">
        {% csrf_token %}

        <!-- OTP Input -->
        <div>
          <label for="otp" class="sr-only">Verification code</label>
          <input
            type="text"
            name="otp"
            id="otp"
            required
            maxlength="6"
            pattern="[0-9]{6}"
            inputmode="numeric"
            autocomplete="one-time-code"
            placeholder="Enter 6-digit code"
            class="block w-full px-5 py-4 text-center text-2xl font-medium tracking-widest
                   border border-gray-300 rounded-xl
                   focus:border-indigo-500 focus:ring-indigo-500 focus:outline-none
                   transition duration-200 bg-gray-50 hover:bg-white
                   placeholder-gray-400 text-gray-900 shadow-sm"
          />
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="w-full py-4 px-6 bg-indigo-600 hover:bg-indigo-700
                 text-white font-medium rounded-xl text-lg
                 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2
                 transition duration-200 shadow-md hover:shadow-lg
                 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          Verify Code
        </button>

        <!-- Optional extra links -->
        <div class="text-center mt-6 text-sm text-gray-500">
          Didn't receive the code? 
          <a href="#" class="text-indigo-600 hover:text-indigo-700 font-medium hover:underline">
            Resend
          </a>
        </div>

      </form>

    </div>

    <!-- Optional footer text -->
    <p class="mt-8 text-center text-sm text-gray-500">
      Contact support if you're having trouble verifying
    </p>

  </div>

</body>
</html>
